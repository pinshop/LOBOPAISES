        .comment {
            position: absolute;
            padding: 8px 14px;
            background: rgba(255, 255, 0, 0.85);
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            animation: fadeUp 3s forwards;
        }

        .comment img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }

            15% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(-80px);
            }
        }

        /* LLUVIA GENERAL */
        .rosquilla-item,
        .quiereme-item,
        .avena-item,
        .agua-item,
        .celula-profile {
            position: absolute;
            pointer-events: none;
            user-select: none;
            animation: fall linear forwards;
            z-index: 10;
        }

        @keyframes fall {
            0% {
                transform: translateY(-150px) rotate(0deg);
            }

            100% {
                transform: translateY(calc(100vh + 150px)) rotate(1080deg);
            }
        }

        /* CÉLULAS */
        .celula-profile {
            border-radius: 50%;
            border: 4px solid #00ffff;
            box-shadow: 0 0 20px #00ffff, inset 0 0 15px rgba(0, 255, 255, 0.4);

        }

        @keyframes celulaFall {
            0% {
                transform: translateY(-120px) rotate(0deg) scale(0.6);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(calc(100vh + 100px)) rotate(720deg) scale(1);
                opacity: 0.7;
            }
        }

        /* NOMBRE CENTRO */
        .gift-sender {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5em;
            font-weight: 900;
            color: #FF4500;
            text-shadow: 0 0 20px #fff, 0 0 40px #FF4500, 0 0 80px #FF4500;
            z-index: 15;
            pointer-events: none;
            animation: popName 4s forwards;
            white-space: nowrap;
        }

        @keyframes popName {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.2);
            }

            15% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }

            75% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
        }

        /* TEXTOS ABAJO */
        .bottom-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;

        // CONEXIÓN (TikFinity local WebSocket)
        class TikFinityConnection {
            constructor(wsUrl) {
                this.wsUrl = wsUrl;
                this.ws = null;
                this.handlers = {};
                this.uniqueId = null;
            }

            on(eventName, eventHandler) {
                if (!this.handlers[eventName]) this.handlers[eventName] = [];
                this.handlers[eventName].push(eventHandler);
            }

            emitLocal(eventName, payload) {
                const list = this.handlers[eventName] || [];
                list.forEach(fn => {
                    try { fn(payload); } catch (e) { console.error(e); }
                });
            }

            connect(uniqueId) {
                this.uniqueId = uniqueId;

                return new Promise((resolve, reject) => {
                    try {
                        this.ws = new WebSocket(this.wsUrl);
                    } catch (err) {
                        reject("No se pudo abrir WebSocket de TikFinity.");
                        return;
                    }

                    const timeout = setTimeout(() => {
                        reject("Timeout conectando a TikFinity.");
                    }, 15000);

                    this.ws.onopen = () => {
                        // TikFinity suele estar ya conectado desde la app desktop.
                        // Enviamos mensajes de conexión opcionales por compatibilidad.
                        const connectMsgs = [
                            { action: "connect", uniqueId: uniqueId },
                            { event: "setUniqueId", uniqueId: uniqueId },
                            { type: "setUniqueId", uniqueId: uniqueId }
                        ];
                        connectMsgs.forEach(msg => {
                            try { this.ws.send(JSON.stringify(msg)); } catch (_) { }
                        });

                        clearTimeout(timeout);
                        resolve({ roomId: uniqueId || "tikfinity-local" });
                    };

                    this.ws.onerror = () => {
                        clearTimeout(timeout);
                        reject("Error de conexión con TikFinity. Verifica que la app esté abierta.");
                    };

                    this.ws.onmessage = (evt) => {
                        let msg;
                        try {
                            msg = JSON.parse(evt.data);
                        } catch (_) {
                            return;
                        }

                        let hash = 0;
                        for (let i = 0; i < evt.data.length; i++) {
                            const char = evt.data.charCodeAt(i);
                            hash = ((hash << 5) - hash) + char;
                            hash |= 0;
                        }
                        const eventId = "evt_" + Math.abs(hash) + "_" + evt.data.length;

                        const eventName = (msg.event || msg.type || msg.eventType || "").toString().toLowerCase();
                        const data = msg.data || msg.payload || msg;
                        const normalized = this.normalizeEvent(eventName, data, eventId);
                        if (!normalized) return;
                        this.emitLocal(normalized.name, normalized.data);
                    };

                    this.ws.onclose = () => {
                        this.emitLocal("streamEnd", {});
                    };
                });
            }

            normalizeEvent(eventName, data, eventId) {
                const uniqueId = data.uniqueId || data.username || data.user || data.userName || "";
                const nickname = data.nickname || data.nickName || uniqueId || "Usuario";
                const profilePictureUrl = data.profilePictureUrl || data.profilePic || data.avatar || "";

                if (eventName.includes("chat") || eventName.includes("comment")) {
                    return {
                        name: "chat",
                        data: {
                            uniqueId,
                            nickname,
                            profilePictureUrl,
                            comment: data.comment || data.message || data.text || ""
                        }
                    };
                }

                if (eventName.includes("gift")) {
                    return {
                        name: "gift",
                        data: {
                            uniqueId,
                            nickname,
                            profilePictureUrl,
                            giftId: Number(data.giftId ?? data.gift_id ?? data.id ?? 0),
                            repeatCount: Number(data.repeatCount ?? data.repeat_count ?? data.count ?? 1),
                            repeatEnd: Boolean(data.repeatEnd ?? data.repeat_end ?? false),
                            groupId: data.groupId ?? data.group_id ?? data.comboId ?? data.combo_id ?? data.msgId ?? data.msg_id ?? "",
                            eventId: eventId
                        }
                    };
                }

                if (eventName.includes("like")) {
                    return {
                        name: "like",
                        data: {
                            uniqueId,
                            likeCount: Number(data.likeCount ?? data.count ?? data.likes ?? 1)
                        }
                    };
                }

                if (eventName.includes("follow")) {
                    return { name: "follow", data: { uniqueId } };
                }

                if (eventName.includes("share")) {
                    return { name: "share", data: { uniqueId } };
                }

                return null;
            }
        }

        async function initTokenBar(user) {
            currentUser = user;
            try {
                const snapshot = await db.ref(`licenses/${user}`).once('value');
                let data = snapshot.val();
                if (!data) {
                    data = { tokens: 0, limit: 99999999, blocked: false };
                    db.ref(`licenses/${user}`).set(data);
                }
                
                $("#tokenBarContainer").css("display", "inline-block"); // Si quieres ocultarlo, puedes poner "none"
                
                // Escuchar cambios en tiempo real
                db.ref(`licenses/${user}`).on('value', (snap) => {
                    let d = snap.val();
                    if(d) {
                        currentTokens = d.tokens || 0;
                        tokenLimit = 99999999;
                        $("#currentTokenText").text(currentTokens.toLocaleString());
                        $("#limitTokenText").text(tokenLimit.toLocaleString());
                        
                        let percent = (currentTokens / tokenLimit) * 100;
                        if(percent > 100) percent = 100;
                        $("#tokenProgressBar").css("width", percent + "%");
                        
                        // Lógica de bloqueo y gracia
                        if (d.blocked) {
                            lockOverlayScreen();
                            hideGraceWarning();
                            if (gracePeriodTimeout) clearTimeout(gracePeriodTimeout);
                        } else if (currentTokens >= tokenLimit) {
                            let now = Date.now();
                            if (!d.gracePeriodEndTime) {
                                // Iniciar periodo de gracia (5 min) y guardar en firebase
                                let endTime = now + 5 * 60 * 1000;
                                db.ref(`licenses/${user}/gracePeriodEndTime`).set(endTime);
                            } else {
                                if (now >= d.gracePeriodEndTime) {
                                    // Gracia terminada
                                    lockOverlayScreen();
                                    hideGraceWarning();
                                    if (gracePeriodTimeout) clearTimeout(gracePeriodTimeout);
                                } else {
                                    // Dentro del periodo de gracia
                                    unlockOverlayScreen();
                                    updateGraceWarning(d.gracePeriodEndTime);
                                    
                                    if (gracePeriodTimeout) clearTimeout(gracePeriodTimeout);
                                    gracePeriodTimeout = setTimeout(() => {
                                        lockOverlayScreen();
                                        hideGraceWarning();
                                    }, d.gracePeriodEndTime - now);
                                }
                            }
                        } else {
                            // Todo en orden (tokens < limit y no bloqueado)
                            unlockOverlayScreen();
                            hideGraceWarning();
                            if (gracePeriodTimeout) {
                                clearTimeout(gracePeriodTimeout);
                                gracePeriodTimeout = null;
                            }
                            if (d.gracePeriodEndTime) {
                                db.ref(`licenses/${user}/gracePeriodEndTime`).remove();
                            }
                        }
                    }
                });
            } catch (e) {
                console.error("Error cargando tokens:", e);
            }
        }

            const giftId = Number(data.giftId);
            const repeatCountRaw = Number(data.repeatCount);
            const repeatCount = Number.isFinite(repeatCountRaw) && repeatCountRaw > 0 ? repeatCountRaw : 1;
            const groupId = data.groupId || "";
            const key = groupId ? `${data.uniqueId}:${giftId}:${groupId}` : `${data.uniqueId}:${giftId}`;
            
            const previous = giftProgress[key] || 0;
            let effectivePrevious = previous;

            if (!groupId || giftId === 6427) {
                if (repeatCount === 1 && previous >= 1) {
                    effectivePrevious = 0; // Nuevo combo detectado o regalo enviado de nuevo
                } else if (repeatCount < previous) {
                    return; // Mensaje desordenado, ignorar para no sumar extras
                }
            }

            const deltaCount = Math.max(0, repeatCount - effectivePrevious);

            if (deltaCount > 0) {
                giftProgress[key] = repeatCount;
                
                // Limpiar estado después de 5 segundos de inactividad
                if (window['giftTimeout_' + key]) clearTimeout(window['giftTimeout_' + key]);
                window['giftTimeout_' + key] = setTimeout(() => {
                    delete giftProgress[key];
                }, 5000);

                // === AGREGAR TOKENS ===
                if (currentUser && data.eventId) {
                    const tokenVal = (giftPoints[giftId] || 1) * deltaCount;
                    
                    const dedupeRef = db.ref(`licenses/${currentUser}/processedGifts/${data.eventId}_${repeatCount}`);
                    dedupeRef.transaction((currentValue) => {
                        if (currentValue === null) {
                            return true; // Mark as processed
                        } else {
                            return; // Already processed
                        }
                    }, (error, committed) => {
                        if (committed) {

                            // Limpiar para no saturar Firebase
                            setTimeout(() => dedupeRef.remove(), 3600000);

        function mostrarPodio() {
            // Gather flag scores
            let scores = [];
            $(".flag-item").each(function () {
                const code = $(this).attr("data-code");
                const pts = parseInt($(this).find(".counter").attr("data-points"), 10) || 0;
                const goals = parseInt($(this).find(".counter").text(), 10) || 0;
                scores.push({ code, pts, goals });
            });

            // Sort descending
            scores.sort((a, b) => b.pts - a.pts);
            const top3 = scores.slice(0, 3);

            // Asignar corona al ganador
            $(".crown-badge").hide();
            if (top3[0] && top3[0].pts > 0) {
                $(`#flag-${top3[0].code} .crown-badge`).show();

            const $podio = $('<div class="podio-container"></div>');
            $podio.append('<h1 style="font-size: 5vh; text-shadow: 2px 2px 0 #000; margin-bottom: 40px; color: yellow;">🏆 ¡TIEMPO TERMINADO! 🏆</h1>');

            const $podioFlex = $('<div class="podio-flex"></div>');
            const order = [1, 0, 2]; // 2nd, 1st, 3rd visually
            const animationClasses = ["p2", "p1", "p3"];

            order.forEach(idx => {
                const entry = top3[idx];
                if (!entry) return;

                const place = idx + 1;
                let height = '15vh';
                let color = '#C0C0C0';
                if (place === 1) { height = '22vh'; color = '#FFD700'; }
                if (place === 3) { height = '10vh'; color = '#CD7F32'; }

                let mvpName = "Nadie";
                if (teamMVPs[entry.code]) {
                    const sortedMvps = Object.entries(teamMVPs[entry.code]).sort((a, b) => b[1] - a[1]);
                    if (sortedMvps.length > 0) mvpName = sortedMvps[0][0];
                }

                const $col = $(`
            <div class="podio-col ${animationClasses[idx]}">
                <span style="font-size:4vh; font-weight:bold; color:white; text-shadow: 2px 2px 0 #000; text-align:center;">${entry.goals}<br>Goles</span>
                <img src="https://flagcdn.com/w160/${countryIso[entry.code]}.png" style="width:8vh; border-radius:4px; margin: 1vh 0; box-shadow: 0 0 10px rgba(0,0,0,0.8);">
                <div style="width:10vh; height:${height}; background:${color}; display:flex; justify-content:center; align-items:center; font-size:6vh; font-weight:900; color:black; border-radius:10px 10px 0 0; box-shadow: inset 0 0 20px rgba(0,0,0,0.3);">
                    ${place}°
                </div>
                <div style="margin-top: 1vh; font-size: 1.5vh; font-weight: bold; color: #FFD700; text-shadow: 1px 1px 2px black; text-align: center; max-width: 10vh; word-wrap: break-word;">
                    👑 MVP<br>${mvpName}
                </div>
            </div>
        `);
                $podioFlex.append($col);
            });

            $podio.append($podioFlex);
            $("#zona").append($podio);

            // Reset flags scores after podium (10s espera)
            setTimeout(() => {
                $podio.fadeOut(1000, function () {
                    $(this).remove();
                    $(".flag-item .counter").text("0").attr("data-points", "0");
                    $(".flag-item .progress-bar").css("height", "0%");
                    teamMVPs = {};
                    checkLeader();
                    iniciarTemporizadorGlobal(); // Reinicia auto-contador
                });
            }, 10000);
        }

        function addPointToFlag(code, amount = 1, profilePic = null, nickname = null) {
            const $flag = $(`#flag-${code}`);
            if ($flag.length === 0) return;

            if (nickname) {
                if (!teamMVPs[code]) teamMVPs[code] = {};
                if (!teamMVPs[code][nickname]) teamMVPs[code][nickname] = 0;
                teamMVPs[code][nickname] += amount;
            }

            const $counter = $flag.find(".counter");
            const $progressBar = $flag.find(".progress-bar");
            
            let currentPoints = parseInt($counter.attr("data-points"), 10) || 0;
            currentPoints += amount;
            $counter.attr("data-points", currentPoints);

            let goals = Math.floor(currentPoints / 10);
            let remainder = currentPoints % 10;

            $counter.text(goals);
            $progressBar.css("height", (remainder * 10) + "%");

            $counter.css("transform", "scale(1.5)");
            setTimeout(() => $counter.css("transform", "scale(1)"), 200);

            spawnParticles($flag);
            
            if (profilePic) {
                spawnProfileAnimation($flag, profilePic);
            }

            // Reordenar contenedor
            const $container = $flag.closest('.flags-container');
            sortFlagsContainer($container);
            
            checkLeader();
        }

        function spawnProfileAnimation($flag, profilePic) {
            const flagImg = $flag.find("img:first-child")[0];
            if (!flagImg) return;
            const rect = flagImg.getBoundingClientRect();
            
            const isRightCol = $flag.closest('#rightFlagsContainer').length > 0;
            
            // Start position (100px away)
            const startX = isRightCol ? rect.left - 100 : rect.right + 100;
            const startY = rect.top + rect.height / 2;
            
            // End position (center of flag)
            const endX = rect.left + rect.width / 2;
            const endY = rect.top + rect.height / 2;

            const $img = $('<img src="' + profilePic + '">');
            $img.css({
                position: 'fixed',
                left: startX + 'px',
                top: startY + 'px',
                width: '5vh',
                height: '5vh',
                borderRadius: '50%',
                border: '2px solid white',
                boxShadow: '0 0 10px rgba(0,0,0,0.8)',
                zIndex: 100,
                transform: 'translate(-50%, -50%)',
                opacity: 0,
                pointerEvents: 'none'
            });
            
            $("body").append($img);
            
            $img.animate({
                opacity: 1
            }, 200, function() {
                $img.animate({
                    left: endX + 'px',
                    top: endY + 'px',
                    width: '1vh',
                    height: '1vh',
                    opacity: 0
                }, 1300, function() {
                    $img.remove();
                });
            });
        }

        function sortFlagsContainer($container) {
            const $items = $container.children(".flag-item");
            if ($items.length <= 1) return;

            // 1. Guardar posiciones actuales
            const firstPositions = {};
            $items.each(function() {
                firstPositions[$(this).attr("data-code")] = this.getBoundingClientRect().top;
            });

            // 2. Ordenar en DOM por puntos descendente
            $items.sort((a, b) => {
                const ptsA = parseInt($(a).find(".counter").attr("data-points"), 10) || 0;
                const ptsB = parseInt($(b).find(".counter").attr("data-points"), 10) || 0;
                return ptsB - ptsA;
            });
            $container.append($items);

            // 3. Animar con FLIP
            $items.each(function() {
                const code = $(this).attr("data-code");
                const firstTop = firstPositions[code];
                const lastTop = this.getBoundingClientRect().top;
                const invert = firstTop - lastTop;
                
                if (invert !== 0) {
                    // Mover a posición antigua sin transición
                    $(this).css({
                        transition: 'none',
                        transform: `translateY(${invert}px)`
                    });

                    // Forzar reflow
                    this.offsetHeight;

                    // Mover a nueva posición con transición
                    $(this).css({
                        transition: 'transform 0.5s ease-in-out',
                        transform: 'translateY(0)'
                    });
                } else {
                    $(this).css({
                        transition: 'none',
                        transform: 'translateY(0)'
                    });
                }
            });
        }

        function checkLeader() {
            let allFlags = $(".flag-item").toArray();
            allFlags.sort((a, b) => {
                const ptsA = parseInt($(a).find(".counter").attr("data-points"), 10) || 0;
                const ptsB = parseInt($(b).find(".counter").attr("data-points"), 10) || 0;
                return ptsB - ptsA;
            });

            let max = 0;
            let leaderFlags = [];

            allFlags.forEach((el, index) => {
                const pts = parseInt($(el).find(".counter").attr("data-points"), 10) || 0;
                const rank = index + 1;
                const $badge = $(el).find(".rank-badge");
                
                if (pts > 0 && rank <= 3) {
                    $badge.text(rank).css("display", "flex");
                    if (rank === 1) $badge.css({ background: '#FFD700', color: 'black' });
                    else if (rank === 2) $badge.css({ background: '#E0E0E0', color: 'black' });
                    else if (rank === 3) $badge.css({ background: '#CD7F32', color: 'black' });
                } else {
                    $badge.hide();
                }

                if (pts > max) {
                    max = pts;
                    leaderFlags = [el];
                } else if (pts === max && max > 0) {
                    leaderFlags.push(el);
                }
            });

            $(".flag-item").removeClass("leader-flag");
            if (max > 0) {
                $(leaderFlags).addClass("leader-flag");
            }
        }

        function addRandomPoint() {
            const flags = $(".flag-item");
            if (flags.length === 0) return;
            const randomIdx = Math.floor(Math.random() * flags.length);
            const code = $(flags[randomIdx]).attr("data-code");
            addPointToFlag(code);
        }

        function showQuieremeRain(count = 1) {
            for (let j = 0; j < count; j++) {
                for (let i = 0; i < 15; i++) {
                    setTimeout(() => {
                        const $img = $('<img src="quiereme.png" class="quiereme-item">');
                        const duration = Math.random() * 2 + 3; // 3 to 5 seconds
                        $img.css({
                            left: Math.random() * 90 + 5 + '%',
                            width: (Math.random() * 40 + 40) + 'px',
                            animationDuration: duration + 's'
                        });
                        $("body").append($img);
                        setTimeout(() => $img.remove(), duration * 1000);
                    }, Math.random() * 1000 + (j * 300));
                }
            }
        }

        function showFireworksMVP(nickname) {
            // Lluvia del nombre
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const $rain = $(`<div class="mvp-rain-item">${nickname} MVP 🏆</div>`);
                    $rain.css({
                        left: Math.random() * 90 + 5 + '%',
                        top: '-50px'
                    });
                    $("body").append($rain);
                    setTimeout(() => $rain.remove(), 4000);
                }, i * 150);
            }

            // Fuegos artificiales
            const colors = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF', '#FFFFFF'];
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const $fw = $('<div class="firework"></div>');
                    $fw.css({
                        left: Math.random() * 80 + 10 + '%',
                        top: Math.random() * 80 + 10 + '%',
                        background: colors[Math.floor(Math.random() * colors.length)],
                        boxShadow: `0 0 20px ${colors[Math.floor(Math.random() * colors.length)]}`
                    });
                    $("body").append($fw);
                    setTimeout(() => $fw.remove(), 1000);
                }, Math.random() * 3000);
            }
        }

        function spawnParticles($el) {
            const rect = $el.find("img")[0].getBoundingClientRect();

            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const emojis = ["⭐", "✨", "💥", "🔥", "⚡"];

            for (let i = 0; i < 20; i++) {
                const particle = $('<div class="flag-particle"></div>');
                particle.text(emojis[Math.floor(Math.random() * emojis.length)]);
                $("body").append(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 120 + 60;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.css({
                    left: centerX + 'px',
                    top: centerY + 'px',
                    '--tx': tx + 'px',
                    '--ty': ty + 'px',
                });

                setTimeout(() => particle.remove(), 800);
            }
        }

        // ==== LÓGICA DE OVERLAY Y OBS ====
        $("#generateOverlayBtn").click(async () => {
            let user = $("#uniqueIdInput").val().trim().replace("@", "");
            if (!user) {
                alert("Primero escribe tu @usuario para generar el enlace automático.");
                return;
            }

            const btn = $("#generateOverlayBtn");
            const originalText = btn.val();
            btn.val("Verificando...").prop("disabled", true);

            try {
                const snapshot = await db.ref(`licenses/${user}`).once('value');
                let data = snapshot.val();
                let isNew = false;

                if (!data) {
                    data = { tokens: 0, limit: 35000, blocked: false };
                    isNew = true;
                }

                if (data.blocked || (data.tokens || 0) >= (data.limit || 35000)) {
                    alert(`⚠️ LICENCIA DENEGADA para @${user}.\nTokens consumidos: ${data.tokens || 0}\nLímite: ${data.limit || 35000}\nEstado: ${data.blocked ? 'BLOQUEADO' : 'LÍMITE ALCANZADO'}`);
                    return;
                }

                // Actualizar lastActive y guardar datos iniciales si es usuario nuevo
                const updatePayload = {
                    lastActive: firebase.database.ServerValue.TIMESTAMP
                };
                
                if (isNew || typeof data.tokens === 'undefined') updatePayload.tokens = data.tokens || 0;
                if (isNew || typeof data.limit === 'undefined') updatePayload.limit = data.limit || 35000;
                if (isNew || typeof data.blocked === 'undefined') updatePayload.blocked = !!data.blocked;

                db.ref(`licenses/${user}`).update(updatePayload);

                let currentPath = window.location.href.split('?')[0];
                currentPath = currentPath.replace("localhost", "127.0.0.1");
                let overlayUrl = `${currentPath}?user=${user}&overlay=1&obs=.com`;

                // Abre en una nueva ventana/pestaña como TikTok Chat Reader
                window.open(overlayUrl, "_blank");

            } catch (err) {
                alert("Error al verificar licencia: " + err.message);
            } finally {
                btn.val(originalText).prop("disabled", false);
            }
        });

        // Auto-conectar y Modo Transparente (si viene por URL)
        $(document).ready(() => {
            iniciarTemporizadorGlobal(); // Iniciar contador automáticamente
            $("#leftFlagsContainer, #rightFlagsContainer").css("transform", `scale(0.85)`);

            const urlParams = new URLSearchParams(window.location.search);
            const isOverlay = urlParams.get('overlay');
            const autoUser = urlParams.get('user');

            if (isOverlay) {
                // Modo Overlay: oculta video y quita fondos, pero MANTIENE los controles
                $("body").css("background", "transparent");
                $("#zona").css("background", "transparent");
                $("#videoElement").hide();
                $("#exitFullscreenBtn").hide();
            }

            // Conexión automática para el enlace de OBS/Live Studio
            if (autoUser) {
                $("#uniqueIdInput").val(autoUser);
                setTimeout(connect, 1500);
            }
        });

        // TECLAS DE PRUEBA
        document.addEventListener("keydown", e => {
            if (e.key === "w" || e.key === "W") {
                if (globalTimerInterval) clearInterval(globalTimerInterval);
                $("#globalAutoTimer").text("00:00");
                mostrarPodio();
            }
            if (e.key === "1") addRandomPoint();
            if (e.key === "2") mostrarAvisoPais("TEST_USER", "colombia");
        });
    </script>
